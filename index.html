<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <center>
    <h2>JavaScript String Methods</h2>
    </center>
    <p>Basic Methods</p>
    <script>
        var str="AmAzInG";
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write(str.startsWith('A'));
        document.write("<br>");

        var str1="I learnt about Methods"
        var patt= new RegExp("about")
        var res=patt.test(str1)
        document.write(patt)
        document.write("<br>");
        document.write(res);
    </script>
</body>
</html>
