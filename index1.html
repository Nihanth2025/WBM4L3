<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <h2>JavaScript For Loop</h2>
    <p id="demo"></p>
    <script>
        var fruits=["Kiwi", "Banana", "Jack Fruit", "Apple", "Grapes", "Watermelon"]

        for (i=0; i < fruits.length; i++) {
            var text = fruits[i] + "<br>";
        document.getElementById("demo").innerHTML += text;
        document.write(text);
        }
    </script>
</body>
</html>
